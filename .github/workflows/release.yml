name: Build and Release Android APK

on:
  push:
    tags:
      - 'v*' # Triggers the workflow on tag pushes matching v*, e.g., v1.0.0

jobs:
  build:
    name: Build and Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required for creating a GitHub Release

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install NPM dependencies
        run: npm ci

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Build Android Release APK
        working-directory: ./android
        # Add execution permissions to the gradlew script (fixes Linux compatibility when developed on Windows)
        # Your build.gradle is already configured to sign release builds using the debug keystore!
        run: |
          chmod +x ./gradlew
          ./gradlew assembleRelease

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: SpendWiser Listener ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
